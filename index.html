var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

      var blocks = {
        '██': '█',
        '█ ': '▀',
        ' █': '▄',
        '  ': ' '
      };

      var blocksLastLineNoMargin = {
        '██': '▀',
        '█ ': '▀',
        ' █': ' ',
        '  ': ' '
      };

      var ascii = '';
      for (y = 0; y < size; y += 2) {
        r1 = Math.floor((y - min) / cellSize);
        r2 = Math.floor((y + 1 - min) / cellSize);
        for (x = 0; x < size; x += 1) {
          p = '█';

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r1, Math.floor((x - min) / cellSize))) {
            p = ' ';
          }

          if (min <= x && x < max && min <= y+1 && y+1 < max && _this.isDark(r2, Math.floor((x - min) / cellSize))) {
            p += ' ';
          }
          else {
            p += '█';
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          ascii += (margin < 1 && y+1 >= max) ? blocksLastLineNoMargin[p] : blocks[p];
        }

        ascii += '\n';
      }

      if (size % 2 && margin > 0) {
        return ascii.substring(0, ascii.length - size - 1) + Array(size+1).join('▀');
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.createASCII = function(cellSize, margin) {
      cellSize = cellSize || 1;

      if (cellSize < 2) {
        return _createHalfASCII(margin);
      }

      cellSize -= 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r, p;

      var white = Array(cellSize+1).join('██');
      var black = Array(cellSize+1).join('  ');

      var ascii = '';
      var line = '';
      for (y = 0; y < size; y += 1) {
        r = Math.floor( (y - min) / cellSize);
        line = '';
        for (x = 0; x < size; x += 1) {
          p = 1;

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r, Math.floor((x - min) / cellSize))) {
            p = 0;
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          line += p ? white : black;
        }

        for (r = 0; r < cellSize; r += 1) {
          ascii += line + '\n';
        }
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.renderTo2dContext = function(context, cellSize) {
      cellSize = cellSize || 2;
      var length = _this.getModuleCount();
      for (var row = 0; row < length; row++) {
        for (var col = 0; col < length; col++) {
          context.fillStyle = _this.isDark(row, col) ? 'black' : 'white';
          context.fillRect(row * cellSize, col * cellSize, cellSize, cellSize);
        }
      }
    }

    return _this;
  };

  //---------------------------------------------------------------------
  // qrcode.stringToBytes
  //---------------------------------------------------------------------

  qrcode.stringToBytesFuncs = {
    'default' : function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        bytes.push(c & 0xff);
      }
      return bytes;
    }
  };

  qrcode.stringToBytes = qrcode.stringToBytesFuncs['default'];

  //---------------------------------------------------------------------
  // qrcode.createStringToBytes
  //---------------------------------------------------------------------

  /**
   * @param unicodeData base64 string of byte array.
   * [16bit Unicode],[16bit Bytes], ...
   * @param numChars
   */
  qrcode.createStringToBytes = function(unicodeData, numChars) {

    // create conversion map.

    var unicodeMap = function() {

      var bin = base64DecodeInputStream(unicodeData);
      var read = function() {
        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;
      };

      var count = 0;
      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    var unknownChar = '?'.charCodeAt(0);

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {
          var b = unicodeMap[s.charAt(i)];
          if (typeof b == 'number') {
            if ( (b & 0xff) == b) {
              // 1byte
              bytes.push(b);
            } else {
              // 2bytes
              bytes.push(b >>> 8);
              bytes.push(b & 0xff);
            }
          } else {
            bytes.push(unknownChar);
          }
        }
      }
      return bytes;
    };
  };

  //---------------------------------------------------------------------
  // QRMode
  //---------------------------------------------------------------------

  var QRMode = {
    MODE_NUMBER :    1 << 0,
    MODE_ALPHA_NUM : 1 << 1,
    MODE_8BIT_BYTE : 1 << 2,
    MODE_KANJI :     1 << 3
  };

  //---------------------------------------------------------------------
  // QRErrorCorrectionLevel
  //---------------------------------------------------------------------

  var QRErrorCorrectionLevel = {
    L : 1,
    M : 0,
    Q : 3,
    H : 2
  };

  //---------------------------------------------------------------------
  // QRMaskPattern
  //---------------------------------------------------------------------

  var QRMaskPattern = {
    PATTERN000 : 0,
    PATTERN001 : 1,
    PATTERN010 : 2,
    PATTERN011 : 3,
    PATTERN100 : 4,
    PATTERN101 : 5,
    PATTERN110 : 6,
    PATTERN111 : 7
  };

  //---------------------------------------------------------------------
  // QRUtil
  //---------------------------------------------------------------------

  var QRUtil = function() {

    var PATTERN_POSITION_TABLE = [
      [],

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#1DB954;--dk:#0D3329;--dk2:#081F18;--w:#fff;
  --dim:rgba(255,255,255,.09);--gold:#F5A623;--mg:#777}
html,body{height:100%;font-family:"Noto Sans TC",sans-serif;
  background:var(--dk2);color:var(--w);overflow:hidden}
body::before{content:"";position:fixed;inset:0;
  background:radial-gradient(ellipse at 15% 20%,rgba(29,185,84,.14) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 80%,rgba(29,185,84,.09) 0%,transparent 50%);
  pointer-events:none}
.pg{position:fixed;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;gap:16px;z-index:1;overflow-y:auto}

/* LAND */
#pg-land{display:flex}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-row img{height:26px}
.logo-row span{font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:3px;color:var(--g)}
.hero{text-align:center}
.hero .em{font-size:68px;display:block;margin-bottom:10px;
  animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.hero h1{font-family:"Bebas Neue",sans-serif;font-size:44px;letter-spacing:3px;line-height:1.1}
.hero h1 em{color:var(--g);font-style:normal}
.hero p{font-size:12px;color:var(--mg);margin-top:6px;line-height:1.7}
.info-row{display:flex;gap:10px;max-width:320px;width:100%}
.ic{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--dim);
  border-radius:12px;padding:12px;text-align:center}
.ic .n{font-family:"Bebas Neue",sans-serif;font-size:30px;color:var(--g)}
.ic .l{font-size:10px;color:var(--mg);margin-top:2px}
.btn-g{background:var(--g);color:var(--dk);border:none;border-radius:12px;
  padding:15px 32px;font-size:16px;font-weight:900;font-family:"Noto Sans TC",sans-serif;
  cursor:pointer;width:100%;max-width:320px;letter-spacing:.5px;
  box-shadow:0 4px 20px rgba(29,185,84,.35);transition:transform .12s}
.btn-g:active{transform:scale(.96)}
.btn-g:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--w);border:1px solid var(--dim);
  border-radius:12px;padding:14px 32px;font-size:15px;font-weight:700;
  font-family:"Noto Sans TC",sans-serif;cursor:pointer;width:100%;max-width:240px}

/* ROOM */
#pg-room{gap:14px}
.room-layout{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;
  justify-content:center;width:100%;max-width:780px}
.qr-card{display:flex;flex-direction:column;align-items:center;gap:10px;
  background:rgba(255,255,255,.05);border:1px solid var(--dim);border-radius:16px;padding:20px}
#qrCanvas{width:180px;height:180px;border-radius:10px;background:#fff;padding:6px;overflow:hidden}
.qr-url{font-size:10px;color:var(--g);font-weight:700;
  background:rgba(29,185,84,.1);border:1px solid rgba(29,185,84,.25);
  border-radius:8px;padding:5px 12px;max-width:200px;word-break:break-all;
  text-align:center;text-decoration:none;display:block}
.room-code-big{font-family:"Bebas Neue",sans-serif;font-size:52px;letter-spacing:10px;
  color:var(--g);text-align:center;background:rgba(29,185,84,.1);
  border:2px solid rgba(29,185,84,.3);border-radius:16px;padding:10px 24px}
.rcode-label{font-size:11px;color:var(--mg);text-align:center}
.player-panel{min-width:240px;display:flex;flex-direction:column;gap:10px}
.player-panel h3{font-size:10px;color:var(--mg);letter-spacing:1px;text-transform:uppercase}
.pl-list{display:flex;flex-direction:column;gap:6px;min-height:60px}
.pl-item{background:rgba(255,255,255,.06);border-radius:10px;padding:8px 12px;
  display:flex;align-items:center;gap:10px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pln{font-size:13px;font-weight:700}.plok{font-size:10px;color:var(--g)}
.no-pl{font-size:12px;color:rgba(255,255,255,.2);text-align:center;padding:16px 0}
.wait-msg-txt{font-size:11px;color:rgba(255,255,255,.35);text-align:center}

/* GAME */
#pg-game{padding:0;justify-content:flex-start;align-items:stretch;overflow:hidden}
.g-hdr{display:flex;align-items:center;gap:10px;padding:8px 14px;
  background:rgba(0,0,0,.35);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.g-title{font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:2px;color:var(--g)}
.g-pw{flex:1;height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.g-pb{height:100%;background:linear-gradient(90deg,var(--g),#5DE87A);
  border-radius:4px;transition:width .6s ease}
.g-pt{font-size:12px;color:rgba(255,255,255,.45);white-space:nowrap}
.game-body{display:flex;flex:1;overflow:hidden;min-height:0}
.h-board-area{flex:1;display:flex;align-items:center;justify-content:center;
  padding:10px;overflow:auto}
.h-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:6px;padding:2px}
.h-cell{width:108px;height:86px;position:relative;border-radius:3px;
  overflow:hidden;background:rgba(255,255,255,.04)}
.cn{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:10px;color:rgba(255,255,255,.1);font-weight:700}
.ptag{position:absolute;bottom:2px;right:2px;font-size:8px;
  background:rgba(0,0,0,.6);border-radius:4px;padding:1px 4px;white-space:nowrap}
.h-scores{width:190px;background:rgba(0,0,0,.25);border-left:1px solid rgba(255,255,255,.06);
  padding:12px;overflow-y:auto;flex-shrink:0}
.h-scores h3{font-size:9px;color:var(--mg);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:10px}
.sr{background:rgba(255,255,255,.05);border-radius:8px;padding:8px 10px;
  display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rk{font-family:"Bebas Neue",sans-serif;font-size:14px;min-width:14px;
  color:rgba(255,255,255,.3)}
.r0 .rk{color:var(--gold)}.r1 .rk{color:#B0B8C1}.r2 .rk{color:#CD7F32}
.se{font-size:15px}.si{flex:1}
.sn{font-size:11px;font-weight:700}.sp{font-size:9px;color:var(--mg)}
.ss{font-family:"Bebas Neue",sans-serif;font-size:17px;color:var(--g)}

/* FINISH */
#pg-finish{gap:20px}
.f-trophy{font-size:76px;animation:bounce 1s ease-in-out infinite alternate}
@keyframes bounce{to{transform:translateY(-14px)}}
.f-title{font-family:"Bebas Neue",sans-serif;font-size:42px;letter-spacing:4px;
  color:var(--gold);text-align:center}
.f-lb{width:100%;max-width:480px;display:flex;flex-direction:column;gap:8px}
.flb-row{background:rgba(255,255,255,.07);border:1px solid var(--dim);
  border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.fp1{background:rgba(245,166,35,.18);border-color:var(--gold);transform:scale(1.03)}
.fp2{background:rgba(176,184,193,.12);border-color:#B0B8C1}
.fp3{background:rgba(205,127,50,.12);border-color:#CD7F32}
.flb-medal{font-size:26px}.flb-emo{font-size:26px}
.flb-info{flex:1}.flb-nm{font-size:15px;font-weight:900}
.flb-pt{font-size:11px;color:var(--mg)}
.flb-sc{font-family:"Bebas Neue",sans-serif;font-size:30px;color:var(--g)}
.pledge-card{background:rgba(29,185,84,.1);border:1px solid rgba(29,185,84,.3);
  border-radius:14px;padding:18px 24px;text-align:center;max-width:440px;width:100%}
.pledge-card .pl{font-size:10px;color:var(--g);letter-spacing:2px;
  font-weight:700;margin-bottom:8px}
.pledge-card p{font-size:13px;line-height:1.85}
.flash{position:fixed;top:12px;left:50%;
  transform:translateX(-50%) translateY(-80px);
  padding:9px 20px;border-radius:10px;font-size:13px;font-weight:900;
  pointer-events:none;z-index:999;transition:transform .3s;white-space:nowrap}
.flash.show{transform:translateX(-50%) translateY(0)}
</style>

function show(id) {
  ['pg-land','pg-room','pg-game','pg-finish'].forEach(function(p) {
    document.getElementById(p).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
}

function flash(msg, ok) {
  var el = document.getElementById('flash');
  el.textContent = msg;
  el.style.background = (ok===false) ? '#E53935' : '#1DB954';
  el.style.color = (ok===false) ? '#fff' : '#0D3329';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 2200);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function rand4() {
  return Math.random().toString(36).slice(2,6).toUpperCase();
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// ── CREATE ROOM ───────────────────────────────────────────────────
function createRoom() {
  if (typeof firebase === 'undefined' || !db) {
    alert('Firebase 尚未載入，請稍後再試或重新整理頁面');
    return;
  }
  roomCode = rand4();
  var roomRef = db.ref('rooms/' + roomCode);

  roomRef.remove().then(function() {
    return roomRef.set({
      phase: 'lobby',
      hostActive: true,
      startTime: 0,
      players: {},
      placements: {},
      pieceOwner: {}
    });
  }).then(function() {
    show('pg-room');
    document.getElementById('roomCodeBig').textContent = roomCode;

    var joinUrl = GH_BASE + '/join.html?room=' + roomCode;
    var linkEl = document.getElementById('joinUrlLink');
    linkEl.textContent = joinUrl;
    linkEl.href = joinUrl;

    // Generate QR code
    // Generate QR code using qrcode-generator library
    (function() {
      var container = document.getElementById('qrCanvas');
      container.innerHTML = '';
      try {
        var qr = qrcode(0, 'M');
        qr.addData(joinUrl);
        qr.make();
        var size = 168;
        var canvas = document.createElement('canvas');
        var cells = qr.getModuleCount();
        var cellSize = Math.floor(size / cells);
        canvas.width = cells * cellSize;
        canvas.height = cells * cellSize;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#000000';
        for (var row = 0; row < cells; row++) {
          for (var col = 0; col < cells; col++) {
            if (qr.isDark(row, col)) {
              ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
            }
          }
        }
        container.style.cssText = 'background:#fff;border-radius:10px;padding:6px;display:inline-block';
        container.appendChild(canvas);
      } catch(e) {
        container.style.cssText = 'font-size:9px;color:#000;padding:8px;word-break:break-all;background:#fff;width:168px;height:168px;display:flex;align-items:center;text-align:center;border-radius:10px';
        container.textContent = joinUrl;
        console.error('QR error:', e);
      }
    })();

    // Listen players
    db.ref('rooms/' + roomCode + '/players').on('value', function(snap) {
      playersCache = snap.val() || {};
      renderLobbyPlayers();
    });

    // Listen placements
    db.ref('rooms/' + roomCode + '/placements').on('value', function(snap) {
      placementsCache = snap.val() || {};
      var count = Object.keys(placementsCache).length;
      updateBoardUI(placementsCache);
      updateScoreUI();
      updateProgress(count);
      if (count >= TOTAL) showFinish();
    });
  });
}

function renderLobbyPlayers() {
  var players = Object.values(playersCache);
  document.getElementById('lobbyCount').textContent = players.length + ' 位';
  var list = document.getElementById('lobbyList');
  if (players.length === 0) {
    list.innerHTML = '<div class="no-pl">等待玩家掃碼加入...</div>';
  } else {
    list.innerHTML = players.map(function(p) {
      return '<div class="pl-item"><span style="font-size:20px">' + p.emoji +
        '</span><div><div class="pln">' + esc(p.name) +
        '</div><div class="plok">已就緒 ✓</div></div></div>';
    }).join('');
  }
  var btn = document.getElementById('btnStart');
  btn.disabled = players.length < 1;
  document.getElementById('waitMsg').textContent =
    players.length >= 1 ? players.length + ' 位玩家就緒，可以開始！' : '至少需要 1 位玩家才能開始';
}

// ── START GAME ────────────────────────────────────────────────────
function startGame() {
  var players = Object.values(playersCache);
  if (players.length < 1) { flash('至少需要 1 位玩家！', false); return; }

  document.getElementById('btnStart').disabled = true;

  var pieces = shuffle(Array.from({length:TOTAL}, function(_,i){ return i; }));
  var perPlayer = Math.floor(TOTAL / players.length);
  var extra = TOTAL % players.length;
  var pieceOwner = {};
  var handMap = {};
  var idx = 0;

  players.forEach(function(p, i) {
    var count = perPlayer + (i < extra ? 1 : 0);
    var hand = pieces.slice(idx, idx + count);
    idx += count;
    hand.forEach(function(pi) { pieceOwner[pi] = p.id; });
    handMap[p.id] = hand;
  });

  // Write phase + pieceOwner first
  db.ref('rooms/' + roomCode).update({
    phase: 'playing',
    startTime: Date.now(),
    pieceOwner: pieceOwner,
    placements: {}
  }).then(function() {
    // Write each player's hand
    var promises = Object.keys(handMap).map(function(pid) {
      return db.ref('rooms/' + roomCode + '/players/' + pid).update({ hand: handMap[pid] });
    });
    return Promise.all(promises);
  }).then(function() {
    showGameHost();
  });
}

// ── HOST GAME VIEW ────────────────────────────────────────────────
function showGameHost() {
  show('pg-game');
  var grid = document.getElementById('hostGrid');
  grid.innerHTML = '';
  for (var i = 0; i < TOTAL; i++) {
    var cell = document.createElement('div');
    cell.className = 'h-cell';
    cell.id = 'hc-' + i;
    cell.innerHTML = '<div class="cn">' + (i+1) + '</div>';
    grid.appendChild(cell);
  }
  updateBoardUI(placementsCache);
  updateScoreUI();
}

function updateBoardUI(placements) {
  var grid = document.getElementById('hostGrid');
  if (!grid) return;
  Object.entries(placements).forEach(function(entry) {
    var pi = parseInt(entry[0]);
    var info = entry[1];
    var cell = document.getElementById('hc-' + pi);
    if (!cell || cell.classList.contains('placed')) return;
    var col = pi % COLS, row = Math.floor(pi / COLS);
    var cw = 108, ch = 86, bw = cw*COLS, bh = ch*ROWS;
    cell.innerHTML =
      '<div style="width:'+cw+'px;height:'+ch+'px;' +
      'background:url('+PUZZLE_IMG+') no-repeat;' +
      'background-size:'+bw+'px '+bh+'px;' +
      'background-position:-'+(col*cw)+'px -'+(row*ch)+'px;border-radius:3px"></div>' +
      '<div class="ptag">'+(info.emoji||'')+' '+esc(info.playerName||'')+'</div>';
    cell.classList.add('placed');
  });
}

function updateScoreUI() {
  var scores = {};
  Object.values(playersCache).forEach(function(p) {
    scores[p.id] = {name:p.name, emoji:p.emoji, score:0};
  });
  Object.values(placementsCache).forEach(function(info) {
    if (info.playerId && scores[info.playerId]) scores[info.playerId].score += 10;
  });
  var sorted = Object.values(scores).sort(function(a,b){ return b.score-a.score; });
  var medals = ['🥇','🥈','🥉'];
  var rk = ['r0','r1','r2'];
  document.getElementById('hostScores').innerHTML = sorted.map(function(p,i) {
    return '<div class="sr '+(rk[i]||'')+'">' +
      '<span class="rk">'+(medals[i]||i+1)+'</span>' +
      '<span class="se">'+p.emoji+'</span>' +
      '<div class="si"><div class="sn">'+esc(p.name)+'</div>' +
      '<div class="sp">'+(p.score/10|0)+' 片</div></div>' +
      '<span class="ss">'+p.score+'</span></div>';
  }).join('');
}

function updateProgress(n) {
  var pct = Math.round(n/TOTAL*100);
  document.getElementById('hProg').style.width = pct + '%';
  document.getElementById('hProgTxt').textContent = n + ' / ' + TOTAL;
}

// ── FINISH ────────────────────────────────────────────────────────
function showFinish() {
  var scores = {};
  Object.values(playersCache).forEach(function(p) {
    scores[p.id] = {name:p.name, emoji:p.emoji, score:0};
  });
  Object.values(placementsCache).forEach(function(info) {
    if (info.playerId && scores[info.playerId]) scores[info.playerId].score += 10;
  });
  var sorted = Object.values(scores).sort(function(a,b){ return b.score-a.score; });
  var medals = ['🥇','🥈','🥉'];
  var pc = ['fp1','fp2','fp3'];
  document.getElementById('finishLb').innerHTML = sorted.map(function(p,i) {
    return '<div class="flb-row '+(pc[i]||'')+'">' +
      '<span class="flb-medal">'+(medals[i]||'#'+(i+1))+'</span>' +
      '<span class="flb-emo">'+p.emoji+'</span>' +
      '<div class="flb-info"><div class="flb-nm">'+esc(p.name)+'</div>' +
      '<div class="flb-pt">拼對 '+(p.score/10|0)+' 片</div></div>' +
      '<span class="flb-sc">'+p.score+'</span></div>';
  }).join('');
  show('pg-finish');
}

function restartGame() {
  if (roomCode) db.ref('rooms/'+roomCode).remove();
  playersCache = {}; placementsCache = {}; roomCode = null;
  show('pg-land');
}
</script>
