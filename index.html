// ── State ────────────────────────────────────────────────────────
let roomCode = null;
let roomRef  = null;
let playersCache = {};
let placementsCache = {};

// ── Helpers ──────────────────────────────────────────────────────
function rand4() {
  return Math.random().toString(36).slice(2,6).toUpperCase();
}
function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function show(id) {
  ['pg-land','pg-room','pg-game','pg-finish'].forEach(p=>
    document.getElementById(p).style.display='none');
  document.getElementById(id).style.display='flex';
}

function flash(msg,ok=true){
  const el=document.getElementById('flash');
  el.textContent=msg;
  el.style.background=ok?'#1DB954':'#E53935';
  el.style.color=ok?'#0D3329':'#fff';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2000);
}

// ── CREATE ROOM ──────────────────────────────────────────────────
document.getElementById('btnCreate').addEventListener('click', async ()=>{
  roomCode = rand4();
  roomRef  = ref(db, 'rooms/'+roomCode);

  // Clean old room if exists, then write fresh
  await remove(roomRef);
  await set(roomRef, {
    phase: 'lobby',
    hostActive: true,
    startTime: 0,
    players: {},
    placements: {},
    pieceOwner: {}
  });

  // Show QR page
  show('pg-room');
  document.getElementById('roomCodeBig').textContent = roomCode;

  const joinUrl = GH_BASE+'/join.html?room='+roomCode;
  document.getElementById('joinUrlText').textContent = joinUrl;
  document.getElementById('joinUrlLink').href = joinUrl;

  // Generate QR via api.qrserver.com
  const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(joinUrl);
  document.getElementById('qrImg').src = qrUrl;

  // Listen for players joining
  onValue(ref(db,'rooms/'+roomCode+'/players'), snap=>{
    playersCache = snap.val() || {};
    renderLobbyPlayers();
  });
  onValue(ref(db,'rooms/'+roomCode+'/phase'), snap=>{
    const phase = snap.val();
    if(phase==='playing') showGame();
    if(phase==='finished') {
      // handled by placements listener
    }
  });
  onValue(ref(db,'rooms/'+roomCode+'/placements'), snap=>{
    placementsCache = snap.val() || {};
    const count = Object.keys(placementsCache).length;
    updateBoardUI(placementsCache);
    updateScoreUI();
    updateProgress(count);
    if(count>=TOTAL) showFinish();
  });
});

// ── LOBBY UI ─────────────────────────────────────────────────────
function renderLobbyPlayers(){
  const players = Object.values(playersCache);
  document.getElementById('lobbyCount').textContent = players.length+' 位';
  const list = document.getElementById('lobbyList');
  if(players.length===0){
    list.innerHTML='<div class="no-pl">等待玩家掃碼加入...</div>';
  } else {
    list.innerHTML = players.map(p=>
      `<div class="pl-item"><span>${p.emoji}</span><div><div class="pln">${esc(p.name)}</div><div class="plok">已就緒 ✓</div></div></div>`
    ).join('');
  }
  const btn = document.getElementById('btnStart');
  btn.disabled = players.length < 1;
  document.getElementById('waitMsg').textContent =
    players.length>=1 ? players.length+' 位玩家就緒，可以開始！' : '至少需要 1 位玩家才能開始';
}

// ── START GAME ───────────────────────────────────────────────────
document.getElementById('btnStart').addEventListener('click', async ()=>{
  const players = Object.values(playersCache);
  if(players.length<1){ flash('至少需要 1 位玩家！',false); return; }

  // Distribute pieces
  const pieces = shuffle(Array.from({length:TOTAL},(_,i)=>i));
  const perPlayer = Math.floor(TOTAL/players.length);
  const extra = TOTAL % players.length;
  const pieceOwner = {};
  const handMap = {};
  let idx=0;
  players.forEach((p,i)=>{
    const count = perPlayer + (i<extra?1:0);
    const hand = pieces.slice(idx,idx+count);
    idx+=count;
    hand.forEach(pi=>{ pieceOwner[pi]=p.id; });
    handMap[p.id]=hand;
  });

  // Write to Firebase
  await update(roomRef, {
    phase: 'playing',
    startTime: Date.now(),
    pieceOwner,
    placements: {}
  });
  // Write each player's hand
  for(const [pid,hand] of Object.entries(handMap)){
    await update(ref(db,'rooms/'+roomCode+'/players/'+pid),{hand});
  }
  showGame();
});

// ── GAME UI ──────────────────────────────────────────────────────
function showGame(){
  show('pg-game');
  initBoardUI();
}

function initBoardUI(){
  const grid = document.getElementById('hostGrid');
  grid.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const cell=document.createElement('div');
    cell.className='h-cell';
    cell.id='hc-'+i;
    cell.innerHTML=`<div class="cn">${i+1}</div>`;
    grid.appendChild(cell);
  }
  // Replay existing placements
  updateBoardUI(placementsCache);
  updateScoreUI();
}

function updateBoardUI(placements){
  if(!document.getElementById('hostGrid')) return;
  Object.entries(placements).forEach(([pi,info])=>{
    pi=parseInt(pi);
    const cell=document.getElementById('hc-'+pi);
    if(!cell||cell.classList.contains('placed')) return;
    const col=pi%COLS, row=Math.floor(pi/COLS);
    const cw=108,ch=86, bw=cw*COLS, bh=ch*ROWS;
    cell.innerHTML=`
      <div style="width:${cw}px;height:${ch}px;
        background:url(${PUZZLE_IMG}) no-repeat;
        background-size:${bw}px ${bh}px;
        background-position:-${col*cw}px -${row*ch}px;
        border-radius:3px"></div>
      <div class="ptag">${info.emoji||''} ${esc(info.playerName||'')}</div>`;
    cell.classList.add('placed');
  });
}

function updateScoreUI(){
  const scores = {};
  Object.values(playersCache).forEach(p=>{ scores[p.id]={...p,score:0}; });
  Object.values(placementsCache).forEach(info=>{
    if(info.playerId && scores[info.playerId]) scores[info.playerId].score+=10;
  });
  const sorted = Object.values(scores).sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  const rk=['r0','r1','r2'];
  document.getElementById('hostScores').innerHTML = sorted.map((p,i)=>
    `<div class="sr ${rk[i]||''}">
      <span class="rk">${medals[i]||i+1}</span>
      <span class="se">${p.emoji}</span>
      <div class="si"><div class="sn">${esc(p.name)}</div>
        <div class="sp">${p.score/10|0} 片</div></div>
      <span class="ss">${p.score}</span>
    </div>`
  ).join('');
}

function updateProgress(n){
  const pct=Math.round(n/TOTAL*100);
  document.getElementById('hProg').style.width=pct+'%';
  document.getElementById('hProgTxt').textContent=n+' / '+TOTAL;
}

// ── FINISH ───────────────────────────────────────────────────────
function showFinish(){
  show('pg-finish');
  const scores={};
  Object.values(playersCache).forEach(p=>{scores[p.id]={...p,score:0}});
  Object.values(placementsCache).forEach(info=>{
    if(info.playerId&&scores[info.playerId]) scores[info.playerId].score+=10;
  });
  const sorted=Object.values(scores).sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  const pc=['fp1','fp2','fp3'];
  document.getElementById('finishLb').innerHTML=sorted.map((p,i)=>
    `<div class="flb-row ${pc[i]||''}">
      <span class="flb-medal">${medals[i]||'#'+(i+1)}</span>
      <span class="flb-emo">${p.emoji}</span>
      <div class="flb-info"><div class="flb-nm">${esc(p.name)}</div>
        <div class="flb-pt">拼對 ${p.score/10|0} 片</div></div>
      <span class="flb-sc">${p.score}</span>
    </div>`
  ).join('');
}

document.getElementById('btnRestart').addEventListener('click',async()=>{
  await remove(roomRef);
  show('pg-land');
  playersCache={};placementsCache={};roomCode=null;roomRef=null;
});

// Set logo
document.getElementById('logoImg').src=LOGO_IMG;
document.querySelectorAll('.logo-img').forEach(el=>el.src=LOGO_IMG);
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#1DB954;--dk:#0D3329;--dk2:#081F18;--w:#fff;
  --dim:rgba(255,255,255,.09);--gold:#F5A623;--mg:#666}
html,body{height:100%;font-family:"Noto Sans TC",sans-serif;
  background:var(--dk2);color:var(--w);overflow:hidden}
body::before{content:"";position:fixed;inset:0;
  background:radial-gradient(ellipse at 15% 20%,rgba(29,185,84,.14) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 80%,rgba(29,185,84,.09) 0%,transparent 50%);
  pointer-events:none}
.pg{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:24px;gap:16px;z-index:1;overflow-y:auto}
.hidden,.pg{display:none}

/* LAND */
#pg-land{display:flex}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-row img{height:26px}
.logo-row span{font-family:"Bebas Neue",sans-serif;font-size:13px;
  letter-spacing:3px;color:var(--g)}
.hero{text-align:center}
.hero .em{font-size:72px;display:block;margin-bottom:10px;
  animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.hero h1{font-family:"Bebas Neue",sans-serif;font-size:44px;letter-spacing:3px;line-height:1.1}
.hero h1 em{color:var(--g);font-style:normal}
.hero p{font-size:12px;color:var(--mg);margin-top:6px;line-height:1.7}
.info-row{display:flex;gap:10px;max-width:320px;width:100%}
.ic{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--dim);
  border-radius:12px;padding:12px;text-align:center}
.ic .n{font-family:"Bebas Neue",sans-serif;font-size:30px;color:var(--g)}
.ic .l{font-size:10px;color:var(--mg);margin-top:2px}

/* BUTTONS */
.btn{border:none;border-radius:12px;padding:15px 32px;font-size:16px;font-weight:900;
  font-family:"Noto Sans TC",sans-serif;cursor:pointer;width:100%;max-width:320px;
  letter-spacing:.5px;transition:transform .12s,opacity .2s}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-g{background:var(--g);color:var(--dk);box-shadow:0 4px 20px rgba(29,185,84,.35)}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--w);border:1px solid var(--dim)}

/* ROOM */
#pg-room{display:none;gap:14px}
.room-layout{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center;
  width:100%;max-width:780px}
.qr-card{display:flex;flex-direction:column;align-items:center;gap:10px;
  background:rgba(255,255,255,.05);border:1px solid var(--dim);border-radius:16px;padding:20px}
.qr-card img{width:180px;height:180px;border-radius:10px;background:#fff;padding:6px}
.qr-url{font-size:10px;color:var(--g);font-weight:700;
  background:rgba(29,185,84,.1);border:1px solid rgba(29,185,84,.25);
  border-radius:8px;padding:5px 12px;max-width:200px;word-break:break-all;text-align:center;
  text-decoration:none}
.room-code-big{font-family:"Bebas Neue",sans-serif;font-size:52px;letter-spacing:10px;
  color:var(--g);text-align:center;background:rgba(29,185,84,.1);
  border:2px solid rgba(29,185,84,.3);border-radius:16px;padding:10px 24px}
.rcode-label{font-size:11px;color:var(--mg);letter-spacing:1px;text-align:center}
.player-panel{min-width:240px;display:flex;flex-direction:column;gap:10px}
.player-panel h3{font-size:10px;color:var(--mg);letter-spacing:1px;text-transform:uppercase}
.pl-list{display:flex;flex-direction:column;gap:6px;min-height:60px}
.pl-item{background:rgba(255,255,255,.06);border-radius:10px;padding:8px 12px;
  display:flex;align-items:center;gap:10px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pln{font-size:13px;font-weight:700} .plok{font-size:10px;color:var(--g)}
.no-pl{font-size:12px;color:rgba(255,255,255,.2);text-align:center;padding:16px 0}
.wait-msg-txt{font-size:11px;color:rgba(255,255,255,.35);text-align:center}

/* GAME */
#pg-game{display:none;padding:0;justify-content:flex-start;align-items:stretch;overflow:hidden}
.g-hdr{display:flex;align-items:center;gap:10px;padding:8px 14px;
  background:rgba(0,0,0,.35);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.g-title{font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:2px;color:var(--g)}
.g-pw{flex:1;height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.g-pb{height:100%;background:linear-gradient(90deg,var(--g),#5DE87A);border-radius:4px;
  transition:width .6s ease}
.g-pt{font-size:12px;color:rgba(255,255,255,.45);white-space:nowrap}
.game-body{display:flex;flex:1;overflow:hidden;min-height:0}
.h-board-area{flex:1;display:flex;align-items:center;justify-content:center;
  padding:10px;overflow:auto}
.h-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:6px;padding:2px}
.h-cell{width:108px;height:86px;position:relative;border-radius:3px;
  overflow:hidden;background:rgba(255,255,255,.04)}
.h-cell.placed{}
.cn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:rgba(255,255,255,.1);font-weight:700}
.ptag{position:absolute;bottom:2px;right:2px;font-size:8px;
  background:rgba(0,0,0,.6);border-radius:4px;padding:1px 4px;white-space:nowrap}
.h-scores{width:190px;background:rgba(0,0,0,.25);border-left:1px solid rgba(255,255,255,.06);
  padding:12px;overflow-y:auto;flex-shrink:0}
.h-scores h3{font-size:9px;color:var(--mg);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.sr{background:rgba(255,255,255,.05);border-radius:8px;padding:8px 10px;
  display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rk{font-family:"Bebas Neue",sans-serif;font-size:14px;min-width:14px;color:rgba(255,255,255,.3)}
.r0 .rk{color:var(--gold)} .r1 .rk{color:#B0B8C1} .r2 .rk{color:#CD7F32}
.se{font-size:15px} .si{flex:1}
.sn{font-size:11px;font-weight:700} .sp{font-size:9px;color:var(--mg)}
.ss{font-family:"Bebas Neue",sans-serif;font-size:17px;color:var(--g)}

/* FINISH */
#pg-finish{display:none;gap:20px}
.f-trophy{font-size:76px;animation:bounce 1s ease-in-out infinite alternate}
@keyframes bounce{to{transform:translateY(-14px)}}
.f-title{font-family:"Bebas Neue",sans-serif;font-size:42px;letter-spacing:4px;color:var(--gold);text-align:center}
.f-lb{width:100%;max-width:480px;display:flex;flex-direction:column;gap:8px}
.flb-row{background:rgba(255,255,255,.07);border:1px solid var(--dim);
  border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.fp1{background:rgba(245,166,35,.18);border-color:var(--gold);transform:scale(1.03)}
.fp2{background:rgba(176,184,193,.12);border-color:#B0B8C1}
.fp3{background:rgba(205,127,50,.12);border-color:#CD7F32}
.flb-medal{font-size:26px} .flb-emo{font-size:26px}
.flb-info{flex:1} .flb-nm{font-size:15px;font-weight:900}
.flb-pt{font-size:11px;color:var(--mg)}
.flb-sc{font-family:"Bebas Neue",sans-serif;font-size:30px;color:var(--g)}
.pledge-card{background:rgba(29,185,84,.1);border:1px solid rgba(29,185,84,.3);
  border-radius:14px;padding:18px 24px;text-align:center;max-width:440px;width:100%}
.pledge-card .pl{font-size:10px;color:var(--g);letter-spacing:2px;font-weight:700;margin-bottom:8px}
.pledge-card p{font-size:13px;line-height:1.85}

/* FLASH */
.flash{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-60px);
  padding:9px 20px;border-radius:10px;font-size:13px;font-weight:900;
  pointer-events:none;z-index:999;transition:transform .3s;white-space:nowrap}
.flash.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- LANDING -->
<div id="pg-land" class="pg">
  <div class="logo-row">
    <img id="logoImg" src="" alt="HT">
    <span>HUMAN TOUCH · 拼圖挑戰</span>
  </div>
  <div class="hero">
    <span class="em">🧩</span>
    <h1>HT 承諾書<br><em>拼圖挑戰</em></h1>
    <p>多人即時拼圖遊戲 · 以 Human Touch 承諾書為題<br>全員掃碼加入，一起還原完整承諾！</p>
  </div>
  <div class="info-row">
    <div class="ic"><div class="n">30</div><div class="l">拼圖片數</div></div>
    <div class="ic"><div class="n">∞</div><div class="l">玩家人數</div></div>
    <div class="ic"><div class="n">10</div><div class="l">每片得分</div></div>
  </div>

</div>

<!-- ROOM / QR LOBBY -->
<div id="pg-room" class="pg">
  <div class="room-layout">
    <div class="qr-card">
      <img id="qrImg" src="" alt="QR">
      <a class="qr-url" id="joinUrlLink" href="#" target="_blank" id="joinUrlText">載入中...</a>
      <div class="rcode-label">或直接輸入房間代碼</div>
      <div class="room-code-big" id="roomCodeBig">----</div>
    </div>
    <div class="player-panel">
      <h3>已加入 <span id="lobbyCount" style="color:var(--g)">0 位</span></h3>
      <div class="pl-list" id="lobbyList">
        <div class="no-pl">等待玩家掃碼加入...</div>
      </div>
      <button class="btn btn-g" id="btnStart" disabled>開始拼圖遊戲 🚀</button>

  </div>
</div>

<!-- GAME (HOST VIEW) -->
<div id="pg-game" class="pg" style="padding:0;justify-content:flex-start;align-items:stretch">
  <div class="g-hdr">
    <div class="g-title">🧩 HT 拼圖挑戰</div>
    <div class="g-pw"><div class="g-pb" id="hProg" style="width:0%"></div></div>
    <div class="g-pt" id="hProgTxt">0 / 30</div>
  </div>
  <div class="game-body">
    <div class="h-board-area">
      <div class="h-grid" id="hostGrid"></div>
    </div>
    <div class="h-scores">
      <h3>即時排名</h3>
      <div id="hostScores"></div>
    </div>
  </div>
</div>

<!-- FINISH -->
<div id="pg-finish" class="pg">
  <div class="f-trophy">🏆</div>
  <div class="f-title">承諾書完成！</div>
  <div class="f-lb" id="finishLb"></div>
  <div class="pledge-card">
    <div class="pl">✨ 承諾宣言</div>
    <p>「我承諾，每一位走進來的顧客，<br>都值得我最好的 <strong>Human Touch</strong>！」<br><br>🤝 現在，讓我們一起簽署承諾書！</p>
  </div>
  <button class="btn btn-ghost" id="btnRestart" style="max-width:240px">🔄 再玩一次</button>
</div>

<div class="flash" id="flash"></div>
</body>
